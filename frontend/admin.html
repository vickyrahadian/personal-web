<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Messages</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    * { border-radius: 0 !important; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Login screen ─────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }

    .login-box h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-box p { font-size: 0.85rem; color: #888; }

    .admin-input {
      border: 1px solid #ddd;
      padding: 10px 14px;
      font-size: 0.93rem;
      width: 100%;
      margin-top: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    .admin-input:focus { border-color: #999; }

    .btn-login {
      width: 100%;
      margin-top: 12px;
      background: #111;
      color: #fff;
      border: none;
      padding: 11px;
      font-weight: 600;
      font-size: 0.93rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #333; }

    #loginError {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #c0392b;
      min-height: 18px;
    }

    /* ── Admin dashboard ──────────────── */
    #dashboard { display: none; }

    .admin-header {
      background: #111;
      color: #fff;
      padding: 14px 0;
    }

    .admin-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header h1 { font-size: 1.1rem; font-weight: 700; margin: 0; }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-logout:hover { border-color: #fff; }

    /* ── Stats bar ────────────────────── */
    .stats-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 0;
    }

    .stat-item { font-size: 0.85rem; color: #555; }
    .stat-item strong { color: #111; font-size: 1.1rem; }

    /* ── Messages table ───────────────── */
    .msg-table-wrap { margin-top: 28px; }

    .msg-table {
      width: 100%;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .msg-table thead {
      background: #111;
      color: #fff;
    }

    .msg-table th {
      padding: 11px 14px;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .msg-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .msg-table tbody tr:last-child td { border-bottom: none; }
    .msg-table tbody tr:hover { background: #fafafa; }

    .msg-text {
      max-width: 380px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #444;
    }

    .msg-date {
      color: #888;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid #ddd;
      color: #888;
      padding: 3px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-delete:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    .badge-count {
      display: inline-block;
      background: #111;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      margin-left: 8px;
    }

    @media (max-width: 640px) {
      .hide-mobile { display: none; }
      .msg-text { max-width: 180px; }
    }
  </style>
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────── -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>Admin Access</h1>
      <p>Enter password to view messages</p>
      <input type="password" class="admin-input" id="passwordInput" placeholder="Password" />
      <button class="btn-login" id="loginBtn">Sign In</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- ── Dashboard ─────────────────────────────────────── -->
  <div id="dashboard">

    <div class="admin-header">
      <div class="container">
        <h1><i class="bi bi-inbox me-2"></i>Messages</h1>
        <button class="btn-logout" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <div class="stats-bar">
      <div class="container">
        <span class="stat-item">Total messages: <strong id="totalCount">0</strong></span>
      </div>
    </div>

    <div class="container msg-table-wrap pb-5">

      <div id="loadingState" class="empty-state">
        <div class="spinner-border text-secondary" style="width:1.8rem;height:1.8rem;" role="status"></div>
        <p class="mt-3 mb-0">Loading messages...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <i class="bi bi-inbox"></i>
        No messages yet.
      </div>

      <div id="tableWrap" style="display:none;">
        <table class="msg-table">
          <thead>
            <tr>
              <th style="width:160px;">Date</th>
              <th>Name</th>
              <th class="hide-mobile">Email</th>
              <th>Message</th>
              <th style="width:60px;"></th>
            </tr>
          </thead>
          <tbody id="msgTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <script>
    let adminPassword = '';

    // ── Format timestamp ─────────────────────────────────
    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      } catch { return iso; }
    }

    // ── Load messages ─────────────────────────────────────
    async function loadMessages() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('tableWrap').style.display = 'none';

      try {
        const res = await fetch('/api/messages', {
          headers: { 'x-admin-password': adminPassword }
        });

        if (res.status === 401) {
          signOut();
          return;
        }

        const messages = await res.json();
        document.getElementById('totalCount').textContent = messages.length;
        document.getElementById('loadingState').style.display = 'none';

        if (messages.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }

        document.getElementById('tableWrap').style.display = 'block';
        const tbody = document.getElementById('msgTableBody');
        tbody.innerHTML = messages.map((m, i) => `
          <tr id="row-${i}">
            <td class="msg-date">${formatDate(m.timestamp)}</td>
            <td><strong>${escapeHtml(m.name)}</strong></td>
            <td class="hide-mobile">
              <a href="mailto:${escapeHtml(m.email)}" style="color:#333;">${escapeHtml(m.email)}</a>
            </td>
            <td><div class="msg-text">${escapeHtml(m.message)}</div></td>
            <td>
              <button class="btn-delete" onclick="deleteMessage(${i}, this)" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        `).join('');

      } catch {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').innerHTML =
          '<i class="bi bi-exclamation-circle"></i>Could not load messages. Is the server running?';
      }
    }

    // ── Delete message ────────────────────────────────────
    async function deleteMessage(index, btn) {
      if (!confirm('Delete this message?')) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i>';

      try {
        const res = await fetch(`/api/messages/${index}`, {
          method: 'DELETE',
          headers: { 'x-admin-password': adminPassword }
        });

        if (res.ok) {
          document.getElementById(`row-${index}`).remove();
          const remaining = document.querySelectorAll('#msgTableBody tr').length;
          document.getElementById('totalCount').textContent = remaining;
          if (remaining === 0) {
            document.getElementById('tableWrap').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
          }
        }
      } catch {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-trash"></i>';
      }
    }

    // ── HTML escape ───────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Login ─────────────────────────────────────────────
    async function attemptLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (!pw) return;

      document.getElementById('loginBtn').textContent = 'Checking...';
      document.getElementById('loginError').textContent = '';

      const res = await fetch('/api/messages', {
        headers: { 'x-admin-password': pw }
      }).catch(() => null);

      document.getElementById('loginBtn').textContent = 'Sign In';

      if (res && res.ok) {
        adminPassword = pw;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadMessages();
      } else {
        document.getElementById('loginError').textContent = 'Incorrect password.';
        document.getElementById('passwordInput').select();
      }
    }

    function signOut() {
      adminPassword = '';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptLogin();
    });
    document.getElementById('logoutBtn').addEventListener('click', signOut);
  </script>

</body>
</html>
